<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" fill="none">
  <!-- 왼쪽 위 작은 점 -->
  <circle cx="118" cy="32" r="18" fill="#4A4A4A"/>

  <!-- i의 세로 획 + 곡선 (S자 커브) -->
  <path d="
    M 118 70
    L 118 160
    Q 118 230, 188 230
    Q 258 230, 258 160
    L 258 150
  " stroke="#4A4A4A" stroke-width="36" stroke-linecap="round" fill="none"/>

  <!-- 오른쪽 큰 O -->
  <circle cx="330" cy="200" r="95" stroke="#4A4A4A" stroke-width="36" fill="none"/>

  <!-- S자에서 O로 연결되는 곡선 -->
  <path d="
    M 258 148
    Q 258 100, 310 100
    Q 370 100, 370 140
  " stroke="#4A4A4A" stroke-width="36" stroke-linecap="round" fill="none"/>

  <!-- GLOBAL 텍스트 -->
  <text x="262" y="215" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="46" letter-spacing="8">
    <tspan fill="#4A4A4A">G</tspan>
    <tspan fill="#2AAFCF">L</tspan>
    <tspan fill="#4A4A4A">OBAL</tspan>
  </text>
</svg>
