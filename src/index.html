<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport 설정:
        - 화면 크기에 맞게 자동으로 조절해줘요
        - 데스크톱 앱이라 크게 중요하진 않지만 습관적으로 넣어요
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IO Global ERP</title>
  </head>
  <body>
    <!--
      id="root" 인 빈 div가 React 앱의 시작점이에요
      
      React가 이 div를 찾아서 안에 모든 화면을 그려 넣어요
      마치 빈 도화지 같은 역할이에요
      
      renderer.ts 에서 이 div를 찾아서 연결해요:
        const root = createRoot(document.getElementById('root'))
    -->
    <div id="root"></div>
  </body>
</html>
