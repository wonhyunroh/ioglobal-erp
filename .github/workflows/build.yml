name: Windows 빌드 & 배포

# ── 언제 실행하나요? ──
# 1. v로 시작하는 태그를 push할 때 (예: v1.0.0, v1.2.3)
# 2. Actions 탭에서 수동으로 실행할 때
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows 빌드
    runs-on: windows-latest   # Windows PC에서 빌드해요

    steps:
      # ── 1. 소스코드 받기 ──
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # ── 2. Node.js 설치 ──
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. 의존성 설치 ──
      - name: 패키지 설치
        run: npm ci

      # ── 4. better-sqlite3를 Windows용으로 재빌드 ──
      - name: 네이티브 모듈 재빌드
        run: npx electron-rebuild
        env:
          npm_config_arch: x64

      # ── 5. Windows용 앱 빌드 ──
      - name: 앱 빌드
        run: npm run make -- --platform win32 --arch x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. 빌드 결과물 업로드 ──
      - name: 빌드 파일 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/make/squirrel.windows/x64/
          retention-days: 30

      # ── 7. GitHub Release에 자동 게시 (태그 push 시에만) ──
      - name: GitHub Release 게시
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/squirrel.windows/x64/*.exe
          name: IO Global ERP ${{ github.ref_name }}
          body: |
            ## IO Global ERP ${{ github.ref_name }}

            ### 설치 방법
            1. 아래 `*Setup.exe` 파일을 다운로드 받으세요
            2. 다운로드한 파일을 더블클릭해서 설치하세요
            3. 설치 완료 후 바탕화면의 아이콘을 클릭하면 실행됩니다

            > Windows 보안 경고가 뜨면 "추가 정보" → "실행" 을 클릭하세요
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
