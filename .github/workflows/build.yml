name: Windows 빌드 & 배포

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # Release 생성 권한

jobs:
  build-windows:
    name: Windows 빌드
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm install

      - name: Windows용 앱 빌드
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Railway 서버 URL - GitHub Secrets에서 가져와요
          # Settings → Secrets → RAILWAY_URL 에 Railway URL 입력
          SERVER_URL: ${{ secrets.RAILWAY_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: 빌드 파일 목록 확인
        run: dir out\make /s /b
        shell: cmd

      - name: 빌드 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/make/squirrel.windows/
          retention-days: 30

      - name: GitHub Release 게시
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/squirrel.windows/**/*Setup.exe
          name: IO Global ERP ${{ github.ref_name }}
          body: |
            ## IO Global ERP ${{ github.ref_name }}

            ### 설치 방법
            1. 아래 `*Setup.exe` 파일을 다운로드 받으세요
            2. 다운로드한 파일을 더블클릭해서 설치하세요
            3. 설치 완료 후 바탕화면의 아이콘을 클릭하면 실행됩니다

            > Windows 보안 경고가 뜨면 **"추가 정보"** → **"실행"** 을 클릭하세요
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
